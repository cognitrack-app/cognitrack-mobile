name: cognitrack_mobile
description: CogniTrack Phone Agent — cognitive load tracking for Android and iOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.5.0

  # ── Local Storage ───────────────────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path_provider: ^2.1.5
  path: ^1.9.1

  # ── Utilities ───────────────────────────────────────────────────────────────
  crypto: ^3.0.6
  connectivity_plus: ^6.1.4
  intl: ^0.20.2
  device_info_plus: ^10.1.2

  # ── State Management ────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Notifications ───────────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── UI Layer (Phase 4) ──────────────────────────────────────────────────────
  go_router: ^14.0.0
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.5
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1

  # ── Icons ───────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.13
  sqflite_common_ffi: ^2.3.4+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/thumbs/
